AWSTemplateFormatVersion: '2010-09-09'
Description: 'Arquitectura 3 - 2 VPCs + Multi-AZ (2 pub + 2 priv cada una) + Internet Gateway + VPC Peering'

Parameters:
  EnvironmentName:
    Type: String
    Default: prod
    Description: Nombre del ambiente
  VpcACIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block para VPC A
  VpcBCIDR:
    Type: String
    Default: 10.1.0.0/16
    Description: CIDR block para VPC B
  # VPC A Subnets
  VpcAPublicSubnet1CIDR:
    Type: String
    Default: 10.0.10.0/24
  VpcAPublicSubnet2CIDR:
    Type: String
    Default: 10.0.20.0/24
  VpcAPrivateSubnet1CIDR:
    Type: String
    Default: 10.0.30.0/24
  VpcAPrivateSubnet2CIDR:
    Type: String
    Default: 10.0.40.0/24
  # VPC B Subnets
  VpcBPublicSubnet1CIDR:
    Type: String
    Default: 10.1.50.0/24
  VpcBPublicSubnet2CIDR:
    Type: String
    Default: 10.1.60.0/24
  VpcBPrivateSubnet1CIDR:
    Type: String
    Default: 10.1.70.0/24
  VpcBPrivateSubnet2CIDR:
    Type: String
    Default: 10.1.80.0/24

Resources:
  # ==================== VPC A ====================
  VpcA:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcACIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc-a'

  InternetGatewayA:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-igw-a'

  IGWAttachmentA:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGatewayA
      VpcId: !Ref VpcA

  # VPC A - Public Subnets
  VpcAPublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcA
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Ref VpcAPublicSubnet1CIDR
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc-a-public-1'

  VpcAPublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcA
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: !Ref VpcAPublicSubnet2CIDR
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc-a-public-2'

  # VPC A - Private Subnets
  VpcAPrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcA
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Ref VpcAPrivateSubnet1CIDR
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc-a-private-1'

  VpcAPrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcA
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: !Ref VpcAPrivateSubnet2CIDR
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc-a-private-2'

  # VPC A - Route Tables
  VpcAPublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VpcA
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc-a-public-rt'

  VpcAPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachmentA
    Properties:
      RouteTableId: !Ref VpcAPublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGatewayA

  VpcAPublicSubnet1RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref VpcAPublicRouteTable
      SubnetId: !Ref VpcAPublicSubnet1

  VpcAPublicSubnet2RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref VpcAPublicRouteTable
      SubnetId: !Ref VpcAPublicSubnet2

  # VPC A - NAT Gateway
  NatGatewayAEIP:
    Type: AWS::EC2::EIP
    DependsOn: IGWAttachmentA
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc-a-nat-eip'

  NatGatewayA:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayAEIP.AllocationId
      SubnetId: !Ref VpcAPublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc-a-nat'

  VpcAPrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VpcA
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc-a-private-rt'

  VpcAPrivateRouteNat:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref VpcAPrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGatewayA

  VpcAPrivateSubnet1RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref VpcAPrivateRouteTable
      SubnetId: !Ref VpcAPrivateSubnet1

  VpcAPrivateSubnet2RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref VpcAPrivateRouteTable
      SubnetId: !Ref VpcAPrivateSubnet2

  # ==================== VPC B ====================
  VpcB:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcBCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc-b'

  InternetGatewayB:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-igw-b'

  IGWAttachmentB:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGatewayB
      VpcId: !Ref VpcB

  # VPC B - Public Subnets
  VpcBPublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcB
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Ref VpcBPublicSubnet1CIDR
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc-b-public-1'

  VpcBPublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcB
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: !Ref VpcBPublicSubnet2CIDR
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc-b-public-2'

  # VPC B - Private Subnets
  VpcBPrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcB
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Ref VpcBPrivateSubnet1CIDR
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc-b-private-1'

  VpcBPrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcB
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: !Ref VpcBPrivateSubnet2CIDR
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc-b-private-2'

  # VPC B - Route Tables
  VpcBPublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VpcB
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc-b-public-rt'

  VpcBPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachmentB
    Properties:
      RouteTableId: !Ref VpcBPublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGatewayB

  VpcBPublicSubnet1RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref VpcBPublicRouteTable
      SubnetId: !Ref VpcBPublicSubnet1

  VpcBPublicSubnet2RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref VpcBPublicRouteTable
      SubnetId: !Ref VpcBPublicSubnet2

  # VPC B - NAT Gateway
  NatGatewayBEIP:
    Type: AWS::EC2::EIP
    DependsOn: IGWAttachmentB
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc-b-nat-eip'

  NatGatewayB:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayBEIP.AllocationId
      SubnetId: !Ref VpcBPublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc-b-nat'

  VpcBPrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VpcB
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc-b-private-rt'

  VpcBPrivateRouteNat:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref VpcBPrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGatewayB

  VpcBPrivateSubnet1RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref VpcBPrivateRouteTable
      SubnetId: !Ref VpcBPrivateSubnet1

  VpcBPrivateSubnet2RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref VpcBPrivateRouteTable
      SubnetId: !Ref VpcBPrivateSubnet2

  # ==================== VPC PEERING ====================
  VPCPeeringConnection:
    Type: AWS::EC2::VPCPeeringConnection
    Properties:
      VpcId: !Ref VpcA
      PeerVpcId: !Ref VpcB
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc-peering-a-to-b'

  # Rutas de Peering - VPC A hacia VPC B
  VpcAPeeringRoutePublic:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref VpcAPublicRouteTable
      DestinationCidrBlock: !Ref VpcBCIDR
      VpcPeeringConnectionId: !Ref VPCPeeringConnection

  VpcAPeeringRoutePrivate:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref VpcAPrivateRouteTable
      DestinationCidrBlock: !Ref VpcBCIDR
      VpcPeeringConnectionId: !Ref VPCPeeringConnection

  # Rutas de Peering - VPC B hacia VPC A
  VpcBPeeringRoutePublic:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref VpcBPublicRouteTable
      DestinationCidrBlock: !Ref VpcACIDR
      VpcPeeringConnectionId: !Ref VPCPeeringConnection

  VpcBPeeringRoutePrivate:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref VpcBPrivateRouteTable
      DestinationCidrBlock: !Ref VpcACIDR
      VpcPeeringConnectionId: !Ref VPCPeeringConnection

  # ==================== SECURITY GROUPS ====================

  # VPC A - Security Group para instancias publicas
  VpcAPublicSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group para instancias publicas en VPC A
      VpcId: !Ref VpcA
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP desde internet
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS desde internet
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH (restringir en produccion)
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
          Description: Todo trafico de salida
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc-a-public-sg'

  # VPC A - Security Group para instancias privadas
  VpcAPrivateSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group para instancias privadas en VPC A
      VpcId: !Ref VpcA
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref VpcAPublicSG
          Description: HTTPS desde subnets publicas VPC A
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref VpcAPublicSG
          Description: MySQL desde subnets publicas VPC A
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref VpcAPublicSG
          Description: PostgreSQL desde subnets publicas VPC A
        - IpProtocol: '-1'
          CidrIp: !Ref VpcBCIDR
          Description: Todo trafico desde VPC B via peering
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
          Description: Todo trafico de salida
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc-a-private-sg'

  # VPC B - Security Group para instancias publicas
  VpcBPublicSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group para instancias publicas en VPC B
      VpcId: !Ref VpcB
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP desde internet
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS desde internet
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH (restringir en produccion)
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
          Description: Todo trafico de salida
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc-b-public-sg'

  # VPC B - Security Group para instancias privadas
  VpcBPrivateSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group para instancias privadas en VPC B
      VpcId: !Ref VpcB
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref VpcBPublicSG
          Description: HTTPS desde subnets publicas VPC B
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref VpcBPublicSG
          Description: MySQL desde subnets publicas VPC B
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref VpcBPublicSG
          Description: PostgreSQL desde subnets publicas VPC B
        - IpProtocol: '-1'
          CidrIp: !Ref VpcACIDR
          Description: Todo trafico desde VPC A via peering
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
          Description: Todo trafico de salida
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc-b-private-sg'

  # ==================== NACLs ====================

  # VPC A - NACL Publica
  VpcAPublicNACL:
    Type: AWS::EC2::NetworkAcl
    Properties:
      VpcId: !Ref VpcA
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc-a-public-nacl'

  VpcAPublicNACLInHTTP:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref VpcAPublicNACL
      RuleNumber: 100
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 80
        To: 80

  VpcAPublicNACLInHTTPS:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref VpcAPublicNACL
      RuleNumber: 110
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 443
        To: 443

  VpcAPublicNACLInSSH:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref VpcAPublicNACL
      RuleNumber: 120
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 22
        To: 22

  VpcAPublicNACLInEphemeral:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref VpcAPublicNACL
      RuleNumber: 130
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 1024
        To: 65535

  VpcAPublicNACLInPeering:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref VpcAPublicNACL
      RuleNumber: 140
      Protocol: -1
      RuleAction: allow
      Egress: false
      CidrBlock: !Ref VpcBCIDR

  VpcAPublicNACLOutAll:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref VpcAPublicNACL
      RuleNumber: 100
      Protocol: -1
      RuleAction: allow
      Egress: true
      CidrBlock: 0.0.0.0/0

  VpcAPublicSubnet1NACLAssoc:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref VpcAPublicSubnet1
      NetworkAclId: !Ref VpcAPublicNACL

  VpcAPublicSubnet2NACLAssoc:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref VpcAPublicSubnet2
      NetworkAclId: !Ref VpcAPublicNACL

  # VPC A - NACL Privada
  VpcAPrivateNACL:
    Type: AWS::EC2::NetworkAcl
    Properties:
      VpcId: !Ref VpcA
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc-a-private-nacl'

  VpcAPrivateNACLInFromPublic:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref VpcAPrivateNACL
      RuleNumber: 100
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: !Ref VpcACIDR
      PortRange:
        From: 443
        To: 443

  VpcAPrivateNACLInMySQL:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref VpcAPrivateNACL
      RuleNumber: 110
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: !Ref VpcACIDR
      PortRange:
        From: 3306
        To: 3306

  VpcAPrivateNACLInPostgres:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref VpcAPrivateNACL
      RuleNumber: 120
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: !Ref VpcACIDR
      PortRange:
        From: 5432
        To: 5432

  VpcAPrivateNACLInPeering:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref VpcAPrivateNACL
      RuleNumber: 130
      Protocol: -1
      RuleAction: allow
      Egress: false
      CidrBlock: !Ref VpcBCIDR

  VpcAPrivateNACLInEphemeral:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref VpcAPrivateNACL
      RuleNumber: 140
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 1024
        To: 65535

  VpcAPrivateNACLOutAll:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref VpcAPrivateNACL
      RuleNumber: 100
      Protocol: -1
      RuleAction: allow
      Egress: true
      CidrBlock: 0.0.0.0/0

  VpcAPrivateSubnet1NACLAssoc:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref VpcAPrivateSubnet1
      NetworkAclId: !Ref VpcAPrivateNACL

  VpcAPrivateSubnet2NACLAssoc:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref VpcAPrivateSubnet2
      NetworkAclId: !Ref VpcAPrivateNACL

  # VPC B - NACL Publica
  VpcBPublicNACL:
    Type: AWS::EC2::NetworkAcl
    Properties:
      VpcId: !Ref VpcB
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc-b-public-nacl'

  VpcBPublicNACLInHTTP:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref VpcBPublicNACL
      RuleNumber: 100
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 80
        To: 80

  VpcBPublicNACLInHTTPS:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref VpcBPublicNACL
      RuleNumber: 110
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 443
        To: 443

  VpcBPublicNACLInSSH:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref VpcBPublicNACL
      RuleNumber: 120
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 22
        To: 22

  VpcBPublicNACLInEphemeral:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref VpcBPublicNACL
      RuleNumber: 130
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 1024
        To: 65535

  VpcBPublicNACLInPeering:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref VpcBPublicNACL
      RuleNumber: 140
      Protocol: -1
      RuleAction: allow
      Egress: false
      CidrBlock: !Ref VpcACIDR

  VpcBPublicNACLOutAll:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref VpcBPublicNACL
      RuleNumber: 100
      Protocol: -1
      RuleAction: allow
      Egress: true
      CidrBlock: 0.0.0.0/0

  VpcBPublicSubnet1NACLAssoc:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref VpcBPublicSubnet1
      NetworkAclId: !Ref VpcBPublicNACL

  VpcBPublicSubnet2NACLAssoc:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref VpcBPublicSubnet2
      NetworkAclId: !Ref VpcBPublicNACL

  # VPC B - NACL Privada
  VpcBPrivateNACL:
    Type: AWS::EC2::NetworkAcl
    Properties:
      VpcId: !Ref VpcB
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc-b-private-nacl'

  VpcBPrivateNACLInFromPublic:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref VpcBPrivateNACL
      RuleNumber: 100
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: !Ref VpcBCIDR
      PortRange:
        From: 443
        To: 443

  VpcBPrivateNACLInMySQL:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref VpcBPrivateNACL
      RuleNumber: 110
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: !Ref VpcBCIDR
      PortRange:
        From: 3306
        To: 3306

  VpcBPrivateNACLInPostgres:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref VpcBPrivateNACL
      RuleNumber: 120
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: !Ref VpcBCIDR
      PortRange:
        From: 5432
        To: 5432

  VpcBPrivateNACLInPeering:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref VpcBPrivateNACL
      RuleNumber: 130
      Protocol: -1
      RuleAction: allow
      Egress: false
      CidrBlock: !Ref VpcACIDR

  VpcBPrivateNACLInEphemeral:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref VpcBPrivateNACL
      RuleNumber: 140
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 1024
        To: 65535

  VpcBPrivateNACLOutAll:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref VpcBPrivateNACL
      RuleNumber: 100
      Protocol: -1
      RuleAction: allow
      Egress: true
      CidrBlock: 0.0.0.0/0

  VpcBPrivateSubnet1NACLAssoc:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref VpcBPrivateSubnet1
      NetworkAclId: !Ref VpcBPrivateNACL

  VpcBPrivateSubnet2NACLAssoc:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref VpcBPrivateSubnet2
      NetworkAclId: !Ref VpcBPrivateNACL

